<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的手账</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #fdf6f0;
            min-height: 100vh;
            padding: 20px;
            color: #444;
        }
        .app-container { max-width: 900px; margin: 0 auto; }
        
        /* Header */
        .app-header { text-align: center; margin-bottom: 30px; }
        .app-header h1 { font-size: 2.2em; color: #7b5544; display: inline-flex; align-items: center; gap: 12px; }

        /* Calendar Section */
        .calendar-card { background: #fff; border-radius: 24px; padding: 24px; box-shadow: 0 8px 32px rgba(123, 85, 68, 0.1); margin-bottom: 24px; }

        /* Month Navigation */
        .calendar-nav { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .nav-btn { background: #fff; border: 2px solid #f0e6df; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; color: #a08070; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover { background: #f5ebe0; color: #7b5544; }
        .current-month { font-size: 1.3em; font-weight: 600; color: #5c4033; min-width: 160px; text-align: center; }
        .today-link { font-size: 0.9em; color: #7b5544; cursor: pointer; padding: 4px 12px; border-radius: 20px; transition: background 0.2s; }
        .today-link:hover { background: #f5ebe0; }
        .checkin-btn { font-size: 0.9em; color: #7b5544; cursor: pointer; padding: 4px 14px; border-radius: 20px; transition: all 0.2s; background: #f5ebe0; }
        .checkin-btn:hover { background: #e0d5cc; }
        .checkin-btn.checked { background: #7b5544; color: #fff; }

        /* Calendar Grid */
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 12px; }
        .weekdays div { text-align: center; font-size: 0.85em; font-weight: 600; color: #a08070; padding: 8px; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-cell { aspect-ratio: 1; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1em; cursor: pointer; position: relative; background: #fdf6f0; border: 2px solid transparent; transition: all 0.25s; color: #5c4033; }
        .day-cell:hover { background: #f0e6df; transform: translateY(-2px); }
        .day-cell.today { border-color: #d4a574; font-weight: bold; color: #7b5544; background: #faf3ec; }
        .day-cell.selected { background: #d4a574; color: #fff; }
        .day-cell.other-month { color: #ccc; background: transparent; }
        .day-cell .record-dot { width: 6px; height: 6px; background: #e07a5f; border-radius: 50%; position: absolute; bottom: 8px; }
        .day-cell.selected .record-dot { background: #fff; }
        .day-cell .checkin-dot { width: 6px; height: 6px; background: #4caf50; border-radius: 50%; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); }
        .day-cell:has(.record-dot) .checkin-dot { right: 8px; bottom: 8px; left: auto; transform: none; }
        .day-cell:has(.record-dot) .record-dot { left: 8px; }

        /* Detail Panel */
        .detail-panel { display: none; background: #fff; border-radius: 24px; padding: 24px; box-shadow: 0 8px 32px rgba(123, 85, 68, 0.1); margin-bottom: 24px; position: relative; }
        .detail-panel.show { display: block; animation: fadeIn 0.4s ease-out; }
        .detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .detail-date-info { display: flex; align-items: center; gap: 12px; }
        .detail-date-number { width: 48px; height: 48px; border-radius: 14px; background: #f5ebe0; display: flex; align-items: center; justify-content: center; font-size: 1.2em; font-weight: bold; color: #7b5544; }
        .detail-date-text { display: flex; flex-direction: column; }
        .detail-date-text .day-of-week { font-size: 1.1em; font-weight: 600; color: #5c4033; }
        .detail-date-text .full-date { font-size: 0.85em; color: #a08070; }
        .close-detail { width: 32px; height: 32px; border-radius: 50%; border: none; background: #f0e6df; color: #5c4033; font-size: 18px; cursor: pointer; transition: background 0.2s; }
        .close-detail:hover { background: #e0d5cc; }

        /* Entry Form */
        .entry-form { display: flex; flex-direction: column; gap: 16px; }
        .entry-input { padding: 14px 18px; border: 2px solid #f0e6df; border-radius: 14px; font-size: 1em; font-family: inherit; transition: border-color 0.3s; background: #faf3ec; }
        .entry-input:focus { outline: none; border-color: #d4a574; background: #fff; }
        .entry-textarea { padding: 14px 18px; border: 2px solid #f0e6df; border-radius: 14px; font-size: 1em; font-family: inherit; transition: border-color 0.3s; background: #faf3ec; min-height: 100px; resize: vertical; }
        .entry-textarea:focus { outline: none; border-color: #d4a574; background: #fff; }
        .save-entry-btn { padding: 14px 28px; background: #7b5544; color: #fff; border: none; border-radius: 14px; font-size: 1.05em; font-weight: 600; cursor: pointer; transition: all 0.25s; align-self: flex-start; }
        .save-entry-btn:hover { background: #5c4033; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(92, 64, 51, 0.3); }

        /* Existing Entries */
        .entries-list { margin-top: 24px; }
        .entries-list h3 { color: #5c4033; margin-bottom: 16px; font-size: 1.1em; display: flex; align-items: center; gap: 8px; }
        .entry-card { background: #fdf6f0; border-radius: 16px; padding: 16px 20px; margin-bottom: 12px; position: relative; transition: transform 0.2s, box-shadow 0.2s; border: 2px solid #f0e6df; }
        .entry-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(123,85,68,0.1); }
        .entry-card h4 { font-size: 1.05em; color: #5c4033; margin-bottom: 6px; }
        .entry-card p { color: #666; line-height: 1.6; white-space: pre-wrap; word-break: break-word; font-size: 0.95em; }
        .entry-card .delete-entry { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #ccc; font-size: 20px; cursor: pointer; transition: color 0.2s; padding: 2px 6px; border-radius: 4px; }
        .entry-card .delete-entry:hover { color: #e07a5f; background: rgba(224,122,95,0.1); }
        .empty-day { text-align: center; padding: 40px; color: #a08070; font-size: 0.95em; }

        /* Entry actions (edit/reply) */
        .entry-actions{display:flex;gap:6px;margin-top:10px}
        .entry-actions button{padding:4px 12px;border:none;border-radius:10px;cursor:pointer;font-size:.8em;font-family:inherit;transition:all .2s;background:#f0e6df;color:#7b5544}
        .entry-actions button:hover{background:#e0d5cc}
        .entry-edit-form{display:flex;flex-direction:column;gap:8px;margin-top:8px}
        .entry-edit-form input,.entry-edit-form textarea{padding:10px 14px;border:2px solid #e0d5cc;border-radius:10px;font-size:.93em;font-family:inherit;background:#fff;transition:border-color .2s}
        .entry-edit-form input:focus,.entry-edit-form textarea:focus{outline:none;border-color:#d4a574}
        .entry-edit-form textarea{min-height:80px;resize:vertical}
        .entry-edit-form .edit-actions{display:flex;gap:6px}
        .entry-edit-form .edit-actions button{padding:6px 18px;border:none;border-radius:10px;cursor:pointer;font-size:.85em;font-family:inherit}
        .edit-save{background:#7b5544;color:#fff}
        .edit-save:hover{background:#5c4033}
        .edit-cancel{background:#f0e6df;color:#7b5544}
        .edit-cancel:hover{background:#e0d5cc}
        /* Replies */
        .replies-section{margin-top:10px;padding-top:10px;border-top:1px solid #f0e6df}
        .reply-item{background:#fff;border-radius:10px;padding:8px 12px;margin-bottom:6px;position:relative;font-size:.88em;color:#5c4033;line-height:1.5}
        .reply-item .reply-time{font-size:.75em;color:#a08070;margin-top:2px}
        .reply-item .reply-delete{position:absolute;top:4px;right:6px;background:none;border:none;color:#ccc;font-size:14px;cursor:pointer}
        .reply-item .reply-delete:hover{color:#e07a5f}
        .reply-input-row{display:flex;gap:8px;margin-top:8px}
        .reply-input-row input{flex:1;padding:8px 12px;border:2px solid #e0d5cc;border-radius:10px;font-size:.88em;font-family:inherit;transition:border-color .2s}
        .reply-input-row input:focus{outline:none;border-color:#d4a574}
        .reply-input-row button{padding:8px 16px;border:none;border-radius:10px;cursor:pointer;font-size:.85em;font-family:inherit;background:#7b5544;color:#fff;white-space:nowrap}
        .reply-input-row button:hover{background:#5c4033}
        .entry-images{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
        .entry-img-wrap{position:relative;width:56px;height:56px;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid #f0e6df;flex-shrink:0}
        .entry-img-wrap img{width:100%;height:100%;object-fit:cover}
        .entry-img-wrap .img-del{position:absolute;top:1px;right:1px;width:18px;height:18px;border-radius:50%;background:rgba(224,122,95,0.9);color:#fff;border:none;font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
        .entry-img-wrap:hover .img-del{display:flex}
        .entry-add-img-btn{padding:3px 10px;border:none;border-radius:8px;cursor:pointer;font-size:.78em;font-family:inherit;background:#f0e6df;color:#7b5544;transition:all .2s}
        .entry-add-img-btn:hover{background:#e0d5cc}


        /* Lightbox */
        .lightbox-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }
        .lightbox-overlay.active { display: flex; }
        .lightbox-overlay img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .lightbox-close {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            font-size: 30px;
            width: 44px; height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lightbox-close:hover { background: rgba(255,255,255,0.3); }

        /* Responsive - 手机端适配 */
        @media (max-width: 768px) {
            body { padding: 8px; }
            .app-header h1 { font-size: 1.5em; }
            .app-container { max-width: 100%; }
            .calendar-card, .detail-panel, .plan-card, .pomodoro-card, .doodle-card, .search-card { padding: 14px; border-radius: 18px; }
            .calendar-nav { gap: 8px; }
            .current-month { font-size: 1.05em; min-width: 120px; }
            .days-grid { gap: 3px; }
            .day-cell { border-radius: 10px; font-size: 0.8em; }
            .tab-bar { gap: 2px; padding: 4px; border-radius: 14px; }
            .tab-btn { padding: 8px 6px; font-size: 0.75em; border-radius: 12px; min-width: 50px; }
            .duration-settings { flex-direction: column; gap: 8px; }
            .mood-weather-row { flex-direction: column; gap: 10px; }
            .emoji-btn { width: 32px; height: 32px; font-size: 1em; }
            .timer-display { width: 160px; height: 160px; }
            .timer-display::before { width: 136px; height: 136px; }
            .timer-time { font-size: 2.2em; }
            .week-slots { grid-template-columns: 1fr; }
            .doodle-toolbar { gap: 6px; }
            .doodle-toolbar button { padding: 6px 10px; font-size: 0.75em; }
            .entry-card { padding: 12px 14px; }
            .entry-actions { flex-wrap: wrap; }
            .entry-actions button { font-size: 0.72em; padding: 3px 8px; }
            .entry-images { gap: 4px; }
            .entry-img-wrap { width: 60px; height: 60px; }
            .search-input-row { flex-direction: column; }
            .search-results { max-height: 350px; }
            .images-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
            .images-grid .image-card { border-radius: 8px; }
            .doodle-file-item { width: 130px; }
            .doodle-file-preview { height: 75px; }
            .plan-nav2 { gap: 8px; }
            .current-plan { font-size: 0.95em; min-width: 180px; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
/* Mood & Weather */
.mood-weather-row{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap}
.mood-section,.weather-section{flex:1;min-width:160px}
.mood-section label,.weather-section label{font-size:.85em;color:#a08070;display:block;margin-bottom:6px}
.emoji-selector{display:flex;gap:6px;flex-wrap:wrap}
.emoji-btn{width:38px;height:38px;border-radius:50%;border:2px solid #f0e6df;background:#fff;font-size:1.2em;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.emoji-btn:hover{transform:scale(1.15);border-color:#d4a574}
.emoji-btn.selected{border-color:#7b5544;background:#f5ebe0;transform:scale(1.1);box-shadow:0 2px 8px rgba(123,85,68,0.2)}
.day-cell .mood-emoji{font-size:1.4em;position:absolute;top:1px;right:1px;pointer-events:none;line-height:1;opacity:0.9;z-index:2;max-width:calc(100% - 2px);overflow:hidden;white-space:nowrap}

/* Tabs */
.tab-bar{display:flex;gap:4px;margin-bottom:20px;background:#fff;border-radius:20px;padding:6px;box-shadow:0 4px 16px rgba(123,85,68,0.08);overflow-x:auto;flex-wrap:wrap}
.tab-btn{flex:1;min-width:70px;padding:10px 8px;border:none;background:transparent;border-radius:16px;cursor:pointer;font-size:.88em;color:#a08070;transition:all .25s;white-space:nowrap;font-family:inherit}
.tab-btn:hover{background:#f5ebe0;color:#7b5544}
.tab-btn.active{background:#7b5544;color:#fff;font-weight:600}
.tab-content{display:none}
.tab-content.active{display:block;animation:fadeIn .35s ease-out}

/* Tags */
.tag-input-row{display:flex;gap:8px;align-items:center}
.tag-input{flex:1;padding:8px 14px;border:2px solid #f0e6df;border-radius:12px;font-size:.9em;font-family:inherit;background:#faf3ec}
.tag-input:focus{outline:none;border-color:#d4a574}
.tag-add-btn{padding:8px 16px;background:#a08070;color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:.85em}
.tags-display{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.tag-chip{background:#f0e6df;color:#7b5544;padding:3px 12px;border-radius:12px;font-size:.82em;display:flex;align-items:center;gap:4px}
.tag-chip .tag-remove{cursor:pointer;color:#ccc;font-size:14px;line-height:1}
.tag-chip .tag-remove:hover{color:#e07a5f}
.entry-card .entry-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.entry-card .entry-tag{background:#f0e6df;color:#7b5544;padding:2px 10px;border-radius:12px;font-size:.78em}

/* Todo */
.todo-section{margin-top:16px;border-top:1px solid #f0e6df;padding-top:16px}
.todo-section h4{color:#5c4033;margin-bottom:10px;font-size:.95em;display:flex;align-items:center;gap:6px}
.todo-input-row{display:flex;gap:8px;margin-bottom:10px}
.todo-input{flex:1;padding:10px 14px;border:2px solid #f0e6df;border-radius:12px;font-size:.9em;font-family:inherit;background:#faf3ec}
.todo-input:focus{outline:none;border-color:#d4a574}
.todo-add-btn{padding:10px 16px;background:#7b5544;color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:.9em;white-space:nowrap}
.todo-list{list-style:none}
.todo-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fdf6f0;border-radius:12px;margin-bottom:6px;transition:all .2s}
.todo-item:hover{background:#f5ebe0}
.todo-item input[type=checkbox]{width:20px;height:20px;accent-color:#7b5544;cursor:pointer;flex-shrink:0}
.todo-item .todo-text{flex:1;font-size:.93em;color:#5c4033}
.todo-item.done .todo-text{text-decoration:line-through;color:#bfb0a5}
.todo-item .todo-del{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:2px 6px;border-radius:4px}
.todo-item .todo-del:hover{color:#e07a5f}



/* Plan */
.plan-card{background:#fff;border-radius:24px;padding:24px;box-shadow:0 8px 32px rgba(123,85,68,0.1);margin-bottom:24px}
.plan-card h2{color:#5c4033;margin-bottom:20px;font-size:1.3em}
.plan-nav2{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:20px}
.plan-nav2 .current-plan{font-size:1.1em;font-weight:600;color:#5c4033;min-width:220px;text-align:center}
.plan-type-toggle{display:flex;gap:4px;background:#f0e6df;border-radius:12px;padding:4px;margin-bottom:20px;width:fit-content}
.plan-type-btn{padding:8px 20px;border:none;background:transparent;border-radius:10px;cursor:pointer;font-size:.9em;color:#a08070;transition:all .2s;font-family:inherit}
.plan-type-btn.active{background:#fff;color:#7b5544;font-weight:600;box-shadow:0 2px 6px rgba(0,0,0,0.08)}
.plan-textarea{width:100%;padding:16px;border:2px solid #f0e6df;border-radius:14px;font-size:.95em;font-family:inherit;background:#faf3ec;min-height:200px;resize:vertical;line-height:1.8}
.plan-textarea:focus{outline:none;border-color:#d4a574;background:#fff}
.plan-save-btn{padding:12px 24px;background:#7b5544;color:#fff;border:none;border-radius:14px;font-size:1em;font-weight:600;cursor:pointer;transition:all .25s;margin-top:12px}
.plan-save-btn:hover{background:#5c4033}
.week-slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.week-slot{background:#fdf6f0;border-radius:14px;padding:12px;border:2px solid #f0e6df}
.week-slot .slot-label{font-weight:600;color:#7b5544;font-size:.88em;margin-bottom:6px}
.week-slot textarea{width:100%;border:1px solid #f0e6df;border-radius:8px;padding:8px;font-size:.85em;font-family:inherit;resize:vertical;min-height:60px;background:#fff}

/* Pomodoro */
.pomodoro-card{background:#fff;border-radius:24px;padding:32px;box-shadow:0 8px 32px rgba(123,85,68,0.1);margin-bottom:24px;text-align:center}
.pomodoro-card h2{color:#5c4033;margin-bottom:24px;font-size:1.3em}
.timer-display{width:220px;height:220px;border-radius:50%;background:conic-gradient(#7b5544 var(--progress,0deg),#f0e6df var(--progress,0deg));display:flex;align-items:center;justify-content:center;margin:0 auto 24px;position:relative}
.timer-display::before{content:'';width:190px;height:190px;border-radius:50%;background:#fff;position:absolute}
.timer-time{font-size:3em;font-weight:700;color:#5c4033;z-index:1;font-variant-numeric:tabular-nums}
.timer-label{font-size:.9em;color:#a08070;margin-top:-16px;margin-bottom:20px;z-index:1;position:relative}
.timer-controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.timer-btn{padding:12px 28px;border:none;border-radius:14px;font-size:1em;font-weight:600;cursor:pointer;transition:all .25s;font-family:inherit}
.timer-btn.start{background:#7b5544;color:#fff}
.timer-btn.start:hover{background:#5c4033}
.timer-btn.pause{background:#e07a5f;color:#fff}
.timer-btn.pause:hover{background:#d0644a}
.timer-btn.reset{background:#f0e6df;color:#7b5544}
.timer-btn.reset:hover{background:#e0d5cc}
.timer-mode-toggle{display:flex;gap:4px;background:#f0e6df;border-radius:12px;padding:4px;margin-bottom:20px;justify-content:center;width:fit-content;margin-left:auto;margin-right:auto}
.timer-mode-btn{padding:8px 20px;border:none;background:transparent;border-radius:10px;cursor:pointer;font-size:.9em;color:#a08070;transition:all .2s;font-family:inherit}
.timer-mode-btn.active{background:#fff;color:#7b5544;font-weight:600;box-shadow:0 2px 6px rgba(0,0,0,0.08)}
.session-count{font-size:.85em;color:#a08070;margin-top:16px}

/* Pomodoro Duration Settings */
.duration-settings{display:flex;gap:16px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.duration-item{display:flex;align-items:center;gap:8px;background:#fdf6f0;padding:8px 16px;border-radius:14px;border:2px solid #f0e6df}
.duration-item label{font-size:.9em;color:#5c4033;white-space:nowrap}
.duration-item input[type=number]{width:52px;padding:6px 8px;border:2px solid #e0d5cc;border-radius:10px;font-size:.95em;text-align:center;font-family:inherit;color:#5c4033;background:#fff;transition:border-color .2s;-moz-appearance:textfield}
.duration-item input[type=number]::-webkit-inner-spin-button,.duration-item input[type=number]::-webkit-outer-spin-button{opacity:1}
.duration-item input[type=number]:focus{outline:none;border-color:#d4a574}
.duration-item .dur-unit{font-size:.85em;color:#a08070}

/* Doodle */
.doodle-card{background:#fff;border-radius:24px;padding:24px;box-shadow:0 8px 32px rgba(123,85,68,0.1);margin-bottom:24px}
.doodle-card h2{color:#5c4033;margin-bottom:16px;font-size:1.3em}
.doodle-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.doodle-toolbar input[type=color]{width:36px;height:36px;border:none;border-radius:8px;cursor:pointer;background:transparent}
.doodle-toolbar input[type=range]{width:100px}

    <div class="app-container">

            <h2>🔍 搜索记录</h2>
            <div class="search-input-row">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 输入关键词搜索..." oninput="doSearch()">
            </div>
            <div class="search-tag-filter">
                <span style="color:#a08070;font-size:.9em">标签筛选:</span>
                <select id="searchTagFilter" onchange="doSearch()">
                    <option value="">全部标签</option>
                </select>
            </div>
            <div class="search-results" id="searchResults">
                <div class="search-no-results">输入关键词开始搜索...</div>
            </div>
        </div>
    </div>

    <!-- 🔍 图片预览弹窗 -->
    <div class="lightbox-overlay" id="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close" onclick="closeLightbox()">×</button>
        <img src="" id="lightboxImg" alt="">
    </div>

<script>
    const STORAGE_KEY = 'my_journal_entries';
    const CHECKIN_KEY = 'my_journal_checkins';
    let currentYear, currentMonth, currentSelectedDate = null;

    const weekdayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
    // ========== 图片预览弹窗（支持左右键导航） ==========
    let lightboxImages=[],lightboxIndex=0;
    function openLightbox(dataUrl) {
        document.getElementById('lightboxImg').src = dataUrl;
        document.getElementById('lightbox').classList.add('active');
    }
    function openImageGallery(images,index){
        lightboxImages=images;lightboxIndex=index||0;
        if(lightboxImages.length>0)openLightbox(lightboxImages[lightboxIndex]);
    }
    function lightboxPrev(){
        if(lightboxImages.length<2)return;
        lightboxIndex=(lightboxIndex-1+lightboxImages.length)%lightboxImages.length;
        document.getElementById('lightboxImg').src=lightboxImages[lightboxIndex];
    }
    function lightboxNext(){
        if(lightboxImages.length<2)return;
        lightboxIndex=(lightboxIndex+1)%lightboxImages.length;
        document.getElementById('lightboxImg').src=lightboxImages[lightboxIndex];
    }
    function openEntryImageGallery(entryId,index){
        const entries=getAllEntries();
        const entry=(entries[currentSelectedDate]||[]).find(e=>e.id==entryId);
        if(!entry||!entry.images)return;
        openImageGallery(entry.images.map(i=>i.data),index);
    }
    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
        lightboxImages=[];lightboxIndex=0;
    }
    // ========== 打卡管理 ==========
    function getAllCheckins(){const stored=localStorage.getItem(CHECKIN_KEY);return stored?JSON.parse(stored):{};}
    function saveAllCheckins(checkins){localStorage.setItem(CHECKIN_KEY,JSON.stringify(checkins));}
    function isCheckedIn(dateStr){return !!getAllCheckins()[dateStr];}
    function toggleCheckin(){
        const todayStr=formatDate(new Date());
        const checkins=getAllCheckins();
        if(checkins[todayStr]){delete checkins[todayStr];}
        else{checkins[todayStr]={checkedAt:new Date().toISOString()};}
        saveAllCheckins(checkins);
        updateCheckinBtn();
        renderCalendar();
        if(currentSelectedDate===todayStr){renderEntries(todayStr);}
    }
    function updateCheckinBtn(){
        const btn=document.getElementById("checkinBtn");
        const todayStr=formatDate(new Date());
        if(isCheckedIn(todayStr)){btn.classList.add("checked");btn.innerHTML="✅ 已打卡";}
        else{btn.classList.remove("checked");btn.innerHTML="✅ 打卡";}
    }
    // ========== 事件绑定 ==========
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') lightboxPrev();
        if (e.key === 'ArrowRight') lightboxNext();
    });

    function formatDate(date) { const y = date.getFullYear(); const m = String(date.getMonth() + 1).padStart(2, '0'); const d = String(date.getDate()).padStart(2, '0'); return `${y}-${m}-${d}`; }
    function parseDate(dateStr) { const parts = dateStr.split('-'); return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2])); }

    function getAllEntries() { const stored = localStorage.getItem(STORAGE_KEY); return stored ? JSON.parse(stored) : {}; }
    function saveAllEntries(entries) { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
    function getEntriesForDate(dateStr) { return getAllEntries()[dateStr] || []; }

    function getMonthDays(year, month) { return new Date(year, month + 1, 0).getDate(); }
    function getFirstDayOfMonth(year, month) { return new Date(year, month, 1).getDay(); }

    function renderCalendar() {
        document.getElementById('currentMonth').textContent = `${currentYear}年 ${currentMonth + 1}月`;
        const grid = document.getElementById('daysGrid');
        grid.innerHTML = '';
        const daysInMonth = getMonthDays(currentYear, currentMonth);
        const firstDay = getFirstDayOfMonth(currentYear, currentMonth);
        const prevMonthDays = firstDay;
        const prevMonthTotal = getMonthDays(currentYear, currentMonth - 1);
        const allEntries = getAllEntries();
        const todayStr = formatDate(new Date());

        for (let i = prevMonthDays - 1; i >= 0; i--) {
            const day = prevMonthTotal - i;
            const el = document.createElement('div');
            el.className = 'day-cell other-month'; el.textContent = day; el.style.opacity = '0.5';
            grid.appendChild(el);
        }

        for (let day = 1; day <= daysInMonth; day++) {
            const date = new Date(currentYear, currentMonth, day);
            const dateStr = formatDate(date);
            const hasEntries = allEntries[dateStr] && allEntries[dateStr].length > 0;
            const hasImages = getImagesForDate(dateStr).length > 0;
            const isToday = dateStr === todayStr;
            const el = document.createElement('div');
            el.className = 'day-cell';
            if (isToday) el.classList.add('today');
            if (currentSelectedDate === dateStr) { el.classList.remove('today'); el.classList.add('selected'); }
            el.innerHTML = `<span>${day}</span>`;
            if (hasEntries || hasImages) el.innerHTML += '<span class="record-dot"></span>';
            if (isCheckedIn(dateStr)) el.innerHTML += '<span class="checkin-dot"></span>';
            el.addEventListener('click', () => selectDate(dateStr));
            grid.appendChild(el);
        }

        const totalCells = prevMonthDays + daysInMonth;
        const remainingCells = (7 - (totalCells % 7)) % 7;
        for (let day = 1; day <= remainingCells; day++) {
            const el = document.createElement('div'); el.className = 'day-cell other-month'; el.textContent = day; el.style.opacity = '0.5';
            grid.appendChild(el);
        }
    }

    function selectDate(dateStr) {
        currentSelectedDate = dateStr;
        const date = parseDate(dateStr);
        document.getElementById('detailDayNum').textContent = date.getDate();
        document.getElementById('detailDayOfWeek').textContent = weekdayNames[date.getDay()];
        const y = date.getFullYear(); const m = date.getMonth() + 1; const d = date.getDate();
        document.getElementById('detailFullDate').textContent = `${y}年${m}月${d}日`;
        document.getElementById('detailPanel').classList.add('show');
        document.getElementById('entryTitle').value = '';
        document.getElementById('entryContent').value = '';
        renderEntries(dateStr);
        renderCalendar();
        setTimeout(() => { document.getElementById('detailPanel').scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
    }

    function closeDetail() { document.getElementById('detailPanel').classList.remove('show'); currentSelectedDate = null; renderCalendar(); }

    function renderEntries(dateStr) {
        const entries = getEntriesForDate(dateStr);
        const container = document.getElementById('entriesList');
        if (entries.length === 0) { container.innerHTML = '<div class="empty-day">🍃 这一天还没有记录，来写点什么吧~</div>'; return; }
        container.innerHTML = entries.map((entry) => {
            const time = new Date(entry.id).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            return `<div class="entry-card"> <button class="delete-entry" onclick="deleteEntry('${entry.id}')" title="删除">×</button> <h4>${escapeHtml(entry.title)}</h4> <p>${escapeHtml(entry.content)}</p> <div style="color:#a08070;font-size:0.8em;margin-top:8px;">${time}</div> </div>`;
        }).join('');
    }

    function saveEntry() {
        const title = document.getElementById('entryTitle').value.trim();
        const content = document.getElementById('entryContent').value.trim();
        if (!title && !content) { alert('请填写标题或内容~'); return; }
        const entries = getAllEntries();
        if (!entries[currentSelectedDate]) entries[currentSelectedDate] = [];
        entries[currentSelectedDate].push({ id: Date.now(), title: title || '无标题', content: content, createdAt: new Date().toISOString() });
        saveAllEntries(entries);
        document.getElementById('entryTitle').value = '';
        document.getElementById('entryContent').value = '';
        renderEntries(currentSelectedDate);
        renderCalendar();
    }

    function deleteEntry(entryId) { if (!confirm('确定要删除这条记录吗？')) return; const entries = getAllEntries(); if (entries[currentSelectedDate]) { entries[currentSelectedDate] = entries[currentSelectedDate].filter(e => e.id != entryId); if (entries[currentSelectedDate].length === 0) delete entries[currentSelectedDate]; saveAllEntries(entries); renderEntries(currentSelectedDate); renderCalendar(); } }

    function changeMonth(delta) { currentMonth += delta; if (currentMonth > 11) { currentMonth = 0; currentYear++; } else if (currentMonth < 0) { currentMonth = 11; currentYear--; } renderCalendar(); }
    function goToToday() { const now = new Date(); currentYear = now.getFullYear(); currentMonth = now.getMonth(); renderCalendar(); selectDate(formatDate(now)); }
    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }


// ==================== Mood & Weather ====================
const MOOD_KEY = 'my_journal_moods';
const WEATHER_KEY = 'my_journal_weathers';
function getAllMoods(){const s=localStorage.getItem(MOOD_KEY);return s?JSON.parse(s):{};}
function saveAllMoods(m){localStorage.setItem(MOOD_KEY,JSON.stringify(m));}
function getMood(d){const moods=getAllMoods()[d];return Array.isArray(moods)?moods:[];}
function toggleMood(d,mood){const m=getAllMoods();if(m[d]&&!Array.isArray(m[d])){m[d]=[m[d]];}if(!m[d])m[d]=[];const idx=m[d].indexOf(mood);if(idx>=0){m[d].splice(idx,1);if(m[d].length===0)delete m[d];}else{m[d].push(mood);}saveAllMoods(m);renderCalendar();}
function getAllWeathers(){const s=localStorage.getItem(WEATHER_KEY);return s?JSON.parse(s):{};}
function saveAllWeathers(w){localStorage.setItem(WEATHER_KEY,JSON.stringify(w));}
function getWeather(d){return getAllWeathers()[d]||null;}
function setWeather(d,w){const ws=getAllWeathers();ws[d]=w;saveAllWeathers(ws);renderCalendar();}
function renderMoodWeather(dateStr){
  const moods=getMood(dateStr);
  document.querySelectorAll('#moodSelector .emoji-btn').forEach(b=>{b.classList.toggle('selected',moods.includes(b.dataset.mood));});
  const weather=getWeather(dateStr);
  document.querySelectorAll('#weatherSelector .emoji-btn').forEach(b=>{b.classList.toggle('selected',b.dataset.weather===weather);});
}

// ==================== Tab Switching ====================
function switchTab(tabId){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const targetBtn=document.querySelector('.tab-btn[data-tab="'+tabId+'"]');
  if(targetBtn)targetBtn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  const targetContent=document.getElementById('tab-'+tabId);
  if(targetContent)targetContent.classList.add('active');
  if(tabId==='doodle')resizeDoodleCanvas();
  if(tabId==='search')updateSearchTagFilter();
  if(tabId==='plan')initPlanTab();
}

// ==================== Tag Management ====================
let currentTags=[];
function initTagInput(){
  const input=document.getElementById('tagInput');
  if(input)input.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();addTag();}});
}
function addTag(){
  const input=document.getElementById('tagInput');
  const tag=input.value.trim();
  if(!tag)return;
  if(currentTags.includes(tag)){alert('标签已存在~');return;}
  if(currentTags.length>=10){alert('最多10个标签~');return;}
  currentTags.push(tag);input.value='';renderTags();
}
function removeTag(tag){currentTags=currentTags.filter(t=>t!==tag);renderTags();}
function renderTags(){
  const el=document.getElementById('tagsDisplay');
  if(el)el.innerHTML=currentTags.map(t=>'<span class="tag-chip">'+t+' <span class="tag-remove" onclick="removeTag(\''+t+'\')">×</span></span>').join('');
}

// ==================== Todo Management ====================
const TODO_KEY='my_journal_todos';
function initTodoInput(){
  const input=document.getElementById('todoInput');
  if(input)input.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();addTodo();}});
}
function getAllTodos(){const s=localStorage.getItem(TODO_KEY);return s?JSON.parse(s):{};}
function saveAllTodos(t){localStorage.setItem(TODO_KEY,JSON.stringify(t));}
function getTodosForDate(d){return getAllTodos()[d]||[];}
function addTodo(){
  const input=document.getElementById('todoInput');
  const text=input.value.trim();
  if(!text)return;
  const todos=getAllTodos();
  if(!todos[currentSelectedDate])todos[currentSelectedDate]=[];
  todos[currentSelectedDate].push({id:Date.now(),text:text,done:false,createdAt:new Date().toISOString()});
  saveAllTodos(todos);input.value='';renderTodos(currentSelectedDate);
}
function toggleTodo(todoId){
  const todos=getAllTodos();
  if(todos[currentSelectedDate]){const t=todos[currentSelectedDate].find(td=>td.id==todoId);if(t){t.done=!t.done;saveAllTodos(todos);renderTodos(currentSelectedDate);}}
}
function deleteTodo(todoId){
  const todos=getAllTodos();
  if(todos[currentSelectedDate]){todos[currentSelectedDate]=todos[currentSelectedDate].filter(td=>td.id!=todoId);if(todos[currentSelectedDate].length===0)delete todos[currentSelectedDate];saveAllTodos(todos);renderTodos(currentSelectedDate);}
}
function renderTodos(d){
  const todos=getTodosForDate(d);
  const list=document.getElementById('todoList');
  if(!list)return;
  if(todos.length===0){list.innerHTML='<div style="color:#a08070;font-size:.85em;text-align:center;padding:12px">暂无待办事项</div>';return;}
  list.innerHTML=todos.map(t=>'<li class="todo-item'+(t.done?' done':'')+'"><input type="checkbox" '+(t.done?'checked':'')+' onchange="toggleTodo('+t.id+')"><span class="todo-text">'+escapeHtml(t.text)+'</span><button class="todo-del" onclick="deleteTodo('+t.id+')" title="删除">×</button></li>').join('');
}



// ==================== Plan Management ====================
const PLAN_KEY='my_journal_plans';
let planWeekOffset=0,planType='week';
function initPlanTab(){updatePlanLabel();renderWeekSlots();loadPlan();}
function updatePlanLabel(){
  const now=new Date();now.setDate(now.getDate()+planWeekOffset*7);
  const monday=getMonday(now);
  const sunday=new Date(monday);sunday.setDate(sunday.getDate()+6);
  const label=planType==='week'?'📅 '+(monday.getMonth()+1)+'月'+monday.getDate()+'日 - '+(sunday.getMonth()+1)+'月'+sunday.getDate()+'日':'📆 '+now.getFullYear()+'年'+(now.getMonth()+1)+'月';
  const el=document.getElementById('currentPlanLabel');if(el)el.textContent=label;
}
function getMonday(d){const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);return new Date(d.setDate(diff));}
function changePlanWeek(delta){planWeekOffset+=delta;initPlanTab();}
function goToPlanToday(){planWeekOffset=0;initPlanTab();}
function setPlanType(type){planType=type;document.querySelectorAll('.plan-type-btn').forEach(b=>b.classList.remove('active'));const btn=document.querySelector('.plan-type-btn[data-plan-type="'+type+'"]');if(btn)btn.classList.add('active');initPlanTab();}
function getPlanKey(){const now=new Date();now.setDate(now.getDate()+planWeekOffset*7);if(planType==='week'){const m=getMonday(new Date(now));return 'week_'+formatDate(m);}else{return 'month_'+now.getFullYear()+'_'+(now.getMonth()+1);}}
function renderWeekSlots(){
  const container=document.getElementById('weekSlots');
  if(!container)return;
  if(planType==='month'){container.style.display='none';return;}
  container.style.display='grid';
  const now=new Date();now.setDate(now.getDate()+planWeekOffset*7);
  const monday=getMonday(new Date(now));
  const dayNames=['周一','周二','周三','周四','周五','周六','周日'];
  let html='';
  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(d.getDate()+i);const dateStr=formatDate(d);const saved=getPlanSlot(dateStr);html+='<div class="week-slot"><div class="slot-label">'+dayNames[i]+' '+(d.getMonth()+1)+'/'+d.getDate()+'</div><textarea data-slot-date="'+dateStr+'" onchange="savePlanSlot(this)" placeholder="计划...">'+escapeHtml(saved)+'</textarea></div>';}
  container.innerHTML=html;
}
function getPlanSlot(dateStr){const plans=getAllPlans();return plans['slot_'+dateStr]||'';}
function savePlanSlot(el){const plans=getAllPlans();plans['slot_'+el.dataset.slotDate]=el.value;saveAllPlans(plans);}
function getAllPlans(){const s=localStorage.getItem(PLAN_KEY);return s?JSON.parse(s):{};}
function saveAllPlans(p){localStorage.setItem(PLAN_KEY,JSON.stringify(p));}
function loadPlan(){const key=getPlanKey();const plans=getAllPlans();const el=document.getElementById('planTextarea');if(el)el.value=plans[key]||'';}
function savePlan(){
  const key=getPlanKey();const plans=getAllPlans();
  const el=document.getElementById('planTextarea');if(el)plans[key]=el.value;
  document.querySelectorAll('[data-slot-date]').forEach(el=>{plans['slot_'+el.dataset.slotDate]=el.value;});
  saveAllPlans(plans);alert('计划已保存~');
}

// ==================== Pomodoro Timer ====================
const TIMER_KEY='my_journal_timer_sessions';
const DURATION_KEY='my_journal_timer_durations';
let timerInterval=null,timerSeconds=25*60,timerTotal=25*60,timerMode='work',timerRunning=false,todaySessions=0;
let workMinutes=25,breakMinutes=5;
function loadDurations(){
  const s=localStorage.getItem(DURATION_KEY);
  if(s){const d=JSON.parse(s);workMinutes=d.work||25;breakMinutes=d.break||5;}
  const wEl=document.getElementById('workDuration');if(wEl)wEl.value=workMinutes;
  const bEl=document.getElementById('breakDuration');if(bEl)bEl.value=breakMinutes;
  resetTimer();
}
function saveDurations(){localStorage.setItem(DURATION_KEY,JSON.stringify({work:workMinutes,break:breakMinutes}));}
function onDurationChange(){
  const wEl=document.getElementById('workDuration');if(wEl){let v=parseInt(wEl.value)||25;v=Math.max(1,Math.min(120,v));wEl.value=v;workMinutes=v;}
  const bEl=document.getElementById('breakDuration');if(bEl){let v=parseInt(bEl.value)||5;v=Math.max(1,Math.min(60,v));bEl.value=v;breakMinutes=v;}
  saveDurations();
  if(!timerRunning){resetTimer();}
}
function getWorkSeconds(){return workMinutes*60;}
function getBreakSeconds(){return breakMinutes*60;}
function playNotificationSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const notes=[880,1100,1320];
    for(let r=0;r<3;r++){
      const offset=r*0.85;
      notes.forEach((freq,i)=>{
        const osc=ctx.createOscillator();const gain=ctx.createGain();
        osc.type='sine';osc.frequency.value=freq;
        const t=ctx.currentTime+offset+i*0.15;
        gain.gain.setValueAtTime(0.3,t);
        gain.gain.exponentialRampToValueAtTime(0.001,t+0.4);
        osc.connect(gain);gain.connect(ctx.destination);
        osc.start(t);osc.stop(t+0.4);
      });
    }
  }catch(e){}
}
function loadTimerSessions(){const s=localStorage.getItem(TIMER_KEY);const today=formatDate(new Date());if(s){const data=JSON.parse(s);todaySessions=data[today]||0;}updateSessionCount();}
function saveTimerSessions(){const today=formatDate(new Date());const s=localStorage.getItem(TIMER_KEY);const data=s?JSON.parse(s):{};data[today]=todaySessions;localStorage.setItem(TIMER_KEY,JSON.stringify(data));}
function updateSessionCount(){const el=document.getElementById('sessionCount');if(el)el.textContent='今日完成: '+todaySessions+' 个番茄';}
function setTimerMode(mode){timerMode=mode;pauseTimer();document.querySelectorAll('.timer-mode-btn').forEach(b=>b.classList.remove('active'));const btn=document.querySelector('.timer-mode-btn[data-timer-mode="'+mode+'"]');if(btn)btn.classList.add('active');if(mode==='work'){timerSeconds=getWorkSeconds();timerTotal=timerSeconds;const el=document.getElementById('timerLabel');if(el)el.textContent='🍅 专注工作 ('+workMinutes+'分钟)';}else{timerSeconds=getBreakSeconds();timerTotal=timerSeconds;const el=document.getElementById('timerLabel');if(el)el.textContent='☕ 休息一下 ('+breakMinutes+'分钟)';}updateTimerDisplay();}
function updateTimerDisplay(){const m=Math.floor(timerSeconds/60);const s=timerSeconds%60;const el=document.getElementById('timerTime');if(el)el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');const display=document.getElementById('timerDisplay');if(display)display.style.setProperty('--progress',((1-timerSeconds/timerTotal)*360)+'deg');}
function startTimer(){if(timerRunning)return;timerRunning=true;const startBtn=document.getElementById('timerStartBtn');const pauseBtn=document.getElementById('timerPauseBtn');if(startBtn)startBtn.style.display='none';if(pauseBtn)pauseBtn.style.display='inline-block';const label=document.getElementById('timerLabel');if(label)label.textContent=timerMode==='work'?'🍅 专注中...':'☕ 休息中...';timerInterval=setInterval(function(){timerSeconds--;updateTimerDisplay();if(timerSeconds<=0)timerComplete();},1000);}
function pauseTimer(){timerRunning=false;clearInterval(timerInterval);const startBtn=document.getElementById('timerStartBtn');const pauseBtn=document.getElementById('timerPauseBtn');if(startBtn)startBtn.style.display='inline-block';if(pauseBtn)pauseBtn.style.display='none';const label=document.getElementById('timerLabel');if(label)label.textContent='已暂停';}
function resetTimer(){pauseTimer();if(timerMode==='work'){timerSeconds=getWorkSeconds();timerTotal=timerSeconds;}else{timerSeconds=getBreakSeconds();timerTotal=timerSeconds;}updateTimerDisplay();const label=document.getElementById('timerLabel');if(label)label.textContent=timerMode==='work'?'🍅 专注工作 ('+workMinutes+'分钟)':'☕ 休息一下 ('+breakMinutes+'分钟)';}
function timerComplete(){clearInterval(timerInterval);timerRunning=false;const startBtn=document.getElementById('timerStartBtn');const pauseBtn=document.getElementById('timerPauseBtn');if(startBtn)startBtn.style.display='inline-block';if(pauseBtn)pauseBtn.style.display='none';if(timerMode==='work'){todaySessions++;saveTimerSessions();updateSessionCount();playNotificationSound();setTimerMode('break');}else{playNotificationSound();setTimerMode('work');}}

// ==================== Doodle ====================
let doodleTool='pen',doodleDrawing=false,doodleHistory=[],editingDoodleIndex=null;
function initDoodle(){
  const canvas=document.getElementById('doodleCanvas');
  if(!canvas)return;
  resizeDoodleCanvas();
  canvas.addEventListener('mousedown',startDoodle);
  canvas.addEventListener('mousemove',drawDoodle);
  canvas.addEventListener('mouseup',endDoodle);
  canvas.addEventListener('mouseleave',endDoodle);
  canvas.addEventListener('touchstart',function(e){e.preventDefault();const t=e.touches[0];const me=new MouseEvent('mousedown',{clientX:t.clientX,clientY:t.clientY});canvas.dispatchEvent(me);});
  canvas.addEventListener('touchmove',function(e){e.preventDefault();const t=e.touches[0];const me=new MouseEvent('mousemove',{clientX:t.clientX,clientY:t.clientY});canvas.dispatchEvent(me);});
  canvas.addEventListener('touchend',function(e){e.preventDefault();const me=new MouseEvent('mouseup',{});canvas.dispatchEvent(me);});
  const sizeSlider=document.getElementById('doodleSize');if(sizeSlider)sizeSlider.addEventListener('input',function(){const lbl=document.getElementById('brushSizeLabel');if(lbl)lbl.textContent=this.value;});
  const colorPicker=document.getElementById('doodleColor');if(colorPicker)colorPicker.addEventListener('change',function(){if(doodleTool==='eraser')setDoodleTool('pen');});
  // 渲染涂鸦文件库
  renderDoodleGallery();
  updateDoodleEditUI();
}
function resizeDoodleCanvas(){
  const canvas=document.getElementById('doodleCanvas');
  if(!canvas)return;
  const wrap=canvas.parentElement;
  const w=wrap.clientWidth;
  canvas.width=w;canvas.height=Math.min(w*0.6,500);
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);
}
function setDoodleTool(tool){doodleTool=tool;const penBtn=document.getElementById('doodlePenBtn');const eraserBtn=document.getElementById('doodleEraserBtn');if(penBtn)penBtn.classList.toggle('active',tool==='pen');if(eraserBtn)eraserBtn.classList.toggle('active',tool==='eraser');}
function startDoodle(e){
  doodleDrawing=true;const canvas=document.getElementById('doodleCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  doodleHistory.push(ctx.getImageData(0,0,canvas.width,canvas.height));
  if(doodleHistory.length>30)doodleHistory.shift();
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width;const scaleY=canvas.height/rect.height;
  ctx.beginPath();ctx.moveTo((e.clientX-rect.left)*scaleX,(e.clientY-rect.top)*scaleY);
  ctx.strokeStyle=doodleTool==='eraser'?'#fff':document.getElementById('doodleColor').value;
  ctx.lineWidth=parseInt(document.getElementById('doodleSize').value);
  ctx.lineCap='round';ctx.lineJoin='round';
}
function drawDoodle(e){if(!doodleDrawing)return;const canvas=document.getElementById('doodleCanvas');if(!canvas)return;const ctx=canvas.getContext('2d');const rect=canvas.getBoundingClientRect();const scaleX=canvas.width/rect.width;const scaleY=canvas.height/rect.height;ctx.lineTo((e.clientX-rect.left)*scaleX,(e.clientY-rect.top)*scaleY);ctx.stroke();}
function endDoodle(){doodleDrawing=false;}
function undoDoodle(){const canvas=document.getElementById('doodleCanvas');if(!canvas)return;const ctx=canvas.getContext('2d');if(doodleHistory.length>0)ctx.putImageData(doodleHistory.pop(),0,0);}
function clearDoodle(){if(!confirm('确定清空画布吗?'))return;const canvas=document.getElementById('doodleCanvas');if(!canvas)return;const ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);doodleHistory=[];editingDoodleIndex=null;updateDoodleEditUI();}

// 生成缩略图（极大减少存储）
function createDoodleThumb(dataURL,callback,size=80){
  const img=new Image();
  img.onload=function(){
    const c=document.createElement('canvas');
    const scale=size/Math.max(img.width,img.height);
    c.width=img.width*scale;c.height=img.height*scale;
    const ctx=c.getContext('2d');
    ctx.drawImage(img,0,0,c.width,c.height);
    callback(c.toDataURL('image/png'));
  };

}

function updateSearchTagFilter(){
  const select=document.getElementById('searchTagFilter');if(!select)return;
  const allTags=new Set();
  const entries=getAllEntries();
  Object.values(entries).forEach(arr=>arr.forEach(e=>{if(e.tags)e.tags.forEach(t=>allTags.add(t));}));
  select.innerHTML='<option value="">全部标签</option>'+Array.from(allTags).sort().map(t=>'<option value="'+t+'">'+t+'</option>').join('');
}
function doSearch(){
  const keyword=(document.getElementById('searchInput')||{}).value||'';
  const keywordLower=keyword.trim().toLowerCase();
  const tagFilter=(document.getElementById('searchTagFilter')||{}).value||'';
  const entries=getAllEntries();
  const results=[];
  Object.entries(entries).forEach(([date,arr])=>{
    arr.forEach(e=>{
      const matchKeyword=!keywordLower||(e.title||'').toLowerCase().includes(keywordLower)||(e.content||'').toLowerCase().includes(keywordLower);
      const matchTag=!tagFilter||(e.tags&&e.tags.includes(tagFilter));
      if(matchKeyword&&matchTag)results.push({date:date,entry:e});
    });
  });
  results.sort((a,b)=>b.entry.id-a.entry.id);
  const container=document.getElementById('searchResults');if(!container)return;
  if(results.length===0){container.innerHTML='<div class="search-no-results">'+(keywordLower||tagFilter?'没有找到匹配的记录~':'输入关键词开始搜索...')+'</div>';return;}
  container.innerHTML=results.map(r=>{const preview=(r.entry.content||'').substring(0,80);const tagsHtml=(r.entry.tags||[]).map(t=>'<span class="entry-tag">'+t+'</span>').join('');return '<div class="search-result-card" onclick="navigateToDate(\''+r.date+'\')"><div class="result-date">📅 '+r.date+'</div><div class="result-title">'+escapeHtml(r.entry.title||'无标题')+'</div><div class="result-preview">'+escapeHtml(preview)+(r.entry.content&&r.entry.content.length>80?'...':'')+'</div>'+(tagsHtml?'<div class="result-tags">'+tagsHtml+'</div>':'')+'</div>';}).join('');
}

// ===== 数据同步（导出/导入/剪贴板） =====
function getAllDataStr(){
  var data={};
  for(var i=0;i<localStorage.length;i++){
    var key=localStorage.key(i);
    if(key.startsWith('my_journal_'))data[key]=localStorage.getItem(key);
  }
  return JSON.stringify(data);
}
function copyToClipboard(){
  var str=getAllDataStr();
  navigator.clipboard.writeText(str).then(function(){
    alert('数据已复制到剪贴板！在另一设备上打开手账后点击"粘贴恢复"。');
  }).catch(function(){
    alert('复制失败，请使用"导出数据"方式。');
  });
}
function pasteFromClipboard(){
  if(!confirm('粘贴将覆盖当前所有数据，确定继续吗？'))return;
  navigator.clipboard.readText().then(function(text){
    try{
      var data=JSON.parse(text);
      var count=0;
      for(var key in data){
        if(key.startsWith('my_journal_')){
          localStorage.setItem(key,data[key]);
          count++;
        }
      }
      if(count===0){alert('剪贴板中没有有效的手账数据。');return;}
      alert('成功恢复 '+count+' 条数据，即将刷新页面。');
      location.reload();
    }catch(ex){alert('剪贴板内容格式错误，无法恢复。');}
  }).catch(function(){
    alert('无法读取剪贴板，请使用"导入数据"方式。');
  });
}
function exportData(){
  var data={};
  for(var i=0;i<localStorage.length;i++){
    var key=localStorage.key(i);
    if(key.startsWith('my_journal_'))data[key]=localStorage.getItem(key);
  }
  var json=JSON.stringify(data,null,2);
  var filename='手账备份_'+new Date().toISOString().slice(0,10)+'.json';
  var blob=new Blob([json],{type:'application/json'});
  // 手机上弹出分享面板，电脑上直接下载
  if(navigator.share){
    var file=new File([blob],filename,{type:'application/json'});
    navigator.share({files:[file],title:'手账备份'}).catch(function(){
      downloadBlob(blob,filename);
    });
  }else{
    downloadBlob(blob,filename);
  }
}
function downloadBlob(blob,filename){
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
function importData(){
  var input=document.createElement('input');
  input.type='file';input.accept='.json';input.style.display='none';
  document.body.appendChild(input);
  input.onchange=function(e){
    var file=e.target.files[0];
    document.body.removeChild(input);
    if(!file)return;
    if(!confirm('导入将覆盖当前所有数据，确定继续吗？'))return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        var count=0;
        for(var key in data){
          if(key.startsWith('my_journal_')){
            localStorage.setItem(key,data[key]);
            count++;
          }
        }
        alert('成功导入 '+count+' 条数据，即将刷新页面。');
        location.reload();
      }catch(ex){alert('文件格式错误，无法导入。');}
    };
    reader.readAsText(file);
  };
  input.click();
}

        var wrap=document.createElement('div');
        wrap.className='entry-img-wrap';
        wrap.onclick=function(){openEntryImageGallery(entry.id,idx);};
        var imgel=document.createElement('img');
        imgel.src=img.data;
        var delBtn=document.createElement('button');
        delBtn.className='img-del';
        delBtn.textContent='×';
        delBtn.onclick=function(e){e.stopPropagation();deleteEntryImage(entry.id,img.id);};
        wrap.appendChild(imgel);wrap.appendChild(delBtn);
        grid.appendChild(wrap);
      });
      imgArea.appendChild(grid);
    }
    var btnRow=document.createElement('div');
    btnRow.style.marginTop='6px';
    var addBtn=document.createElement('button');
    addBtn.className='entry-add-img-btn';
    addBtn.textContent='📷 图片'+(imgs.length>0?' ('+imgs.length+'/10)':' (0/10)');
    addBtn.onclick=function(){addEntryImages(entry.id);};
    btnRow.appendChild(addBtn);
    imgArea.appendChild(btnRow);
    var bodyEl=card.querySelector('.entry-body');
    if(bodyEl)bodyEl.appendChild(imgArea);
  });
}
function addEntryImages(entryId){
  var input=document.createElement('input');
  input.type='file';input.accept='image/*';input.multiple=true;input.style.display='none';
  document.body.appendChild(input);
  input.onchange=function(e){
    var files=e.target.files;
    document.body.removeChild(input);
    if(!files||files.length===0)return;
    var entries=getAllEntries();
    var arr=entries[currentSelectedDate];
    if(!arr)return;
    var entry=arr.find(function(en){return String(en.id)===String(entryId);});
    if(!entry)return;
    if(!entry.images)entry.images=[];
    var remaining=10-entry.images.length;
    if(remaining<=0){alert('每条记录最多10张图片~');return;}
    var count=0;
    function loadNext(idx){
      if(idx>=files.length||count>=remaining){
        try{saveAllEntries(entries);enhanceEntryImages();}catch(e){alert('存储空间不足，请删除一些图片');}
        return;
      }
      var file=files[idx];
      if(!file.type.startsWith('image/')){loadNext(idx+1);return;}
      var reader=new FileReader();
      reader.onload=function(ev){
        var img=new Image();
        img.onload=function(){
          var canvas=document.createElement('canvas');
          var maxW=800,maxH=800;
          var w=img.width,h=img.height;
          if(w>maxW||h>maxH){
            var ratio=Math.min(maxW/w,maxH/h);
            w=Math.round(w*ratio);h=Math.round(h*ratio);
          }
          canvas.width=w;canvas.height=h;
          var ctx=canvas.getContext('2d');
          ctx.drawImage(img,0,0,w,h);
          var compressed=canvas.toDataURL('image/jpeg',0.7);
          entry.images.push({id:Date.now()+Math.random(),data:compressed,createdAt:new Date().toISOString()});
          count++;
          loadNext(idx+1);
        };
        img.src=ev.target.result;
      };
      reader.readAsDataURL(file);
    }
    loadNext(0);
  };
  input.click();
}
function deleteEntryImage(entryId,imageId){
  if(!confirm('确定删除这张图片吗？'))return;
  var entries=getAllEntries();
  var arr=entries[currentSelectedDate];
  if(!arr)return;
  var entry=arr.find(function(en){return String(en.id)===String(entryId);});
  if(!entry||!entry.images)return;
  entry.images=entry.images.filter(function(img){return img.id!=imageId;});
  saveAllEntries(entries);
  enhanceEntryImages();
}

selectDate = function(dateStr){
  currentSelectedDate=dateStr;
  const date=parseDate(dateStr);
  document.getElementById('detailDayNum').textContent=date.getDate();
  document.getElementById('detailDayOfWeek').textContent=weekdayNames[date.getDay()];
  const y=date.getFullYear();const m=date.getMonth()+1;const d=date.getDate();
  document.getElementById('detailFullDate').textContent=y+'年'+m+'月'+d+'日';
  document.getElementById('detailPanel').classList.add('show');
  document.getElementById('entryTitle').value='';
  document.getElementById('entryContent').value='';
  currentTags=[];
  renderEntries(dateStr);
  renderMoodWeather(dateStr);
  renderTodos(dateStr);
  renderTags();
  renderCalendar();
  setTimeout(()=>{document.getElementById('detailPanel').scrollIntoView({behavior:'smooth',block:'start'});},100);
};

// Override renderCalendar to show mood emoji on days
const _origRenderCalendar = renderCalendar;
renderCalendar = function(){
  document.getElementById('currentMonth').textContent=currentYear+'年 '+(currentMonth+1)+'月';
  const grid=document.getElementById('daysGrid');
  grid.innerHTML='';
  const daysInMonth=getMonthDays(currentYear,currentMonth);
  const firstDay=getFirstDayOfMonth(currentYear,currentMonth);
  const prevMonthDays=firstDay;
  const prevMonthTotal=getMonthDays(currentYear,currentMonth-1);
  const allEntries=getAllEntries();
  const todayStr=formatDate(new Date());
  for(let i=prevMonthDays-1;i>=0;i--){const day=prevMonthTotal-i;const el=document.createElement('div');el.className='day-cell other-month';el.textContent=day;el.style.opacity='0.5';grid.appendChild(el);}
  for(let day=1;day<=daysInMonth;day++){
    const date=new Date(currentYear,currentMonth,day);
    const dateStr=formatDate(date);
    const hasEntries=allEntries[dateStr]&&allEntries[dateStr].length>0;
    const isToday=dateStr===todayStr;
    const mood=getMood(dateStr);
    const el=document.createElement('div');
    el.className='day-cell';
    if(isToday)el.classList.add('today');
    if(currentSelectedDate===dateStr){el.classList.remove('today');el.classList.add('selected');}
    el.innerHTML='<span>'+day+'</span>';
    if(hasEntries)el.innerHTML+='<span class="record-dot"></span>';
    if(isCheckedIn(dateStr))el.innerHTML+='<span class="checkin-dot"></span>';
    if(mood.length>0)el.innerHTML+='<span class="mood-emoji">'+mood.join('')+'</span>';
    el.addEventListener('click',()=>selectDate(dateStr));
    grid.appendChild(el);
  }
  const totalCells=prevMonthDays+daysInMonth;
  const remainingCells=(7-(totalCells%7))%7;
  for(let day=1;day<=remainingCells;day++){const el=document.createElement('div');el.className='day-cell other-month';el.textContent=day;el.style.opacity='0.5';grid.appendChild(el);}
};
